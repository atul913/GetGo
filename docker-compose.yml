services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env
    environment:
      - PORT=3000
      - USE_REDIS=true
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    volumes:
      # Mount server and client source files for hot-reloading
      - ./server:/usr/src/app/server
      - ./client:/usr/src/app/client
      # Ensure container's node_modules is used, not overwritten by host
      - /usr/src/app/server/node_modules

  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongodb_data:
  redis_data:
